<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
<title>小e · 小说阅读器</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F5F5F5;--bg-card:#FFFFFF;--text:#111111;--text-dim:#999999;--accent:#000000;--accent2:#333333;--border:rgba(0,0,0,0.08);--font-size:18px;--line-height:1.9;--sb-w:280px}
body.dark{--bg:#080808;--bg-card:#141414;--text:#EDEDED;--text-dim:#666666;--accent:#FFFFFF;--accent2:#CCCCCC;--border:rgba(255,255,255,0.06)}
body{font-family:"Source Serif 4","Noto Serif SC","STSong",serif;background:var(--bg);color:var(--text);min-height:100vh;transition:.3s}
.hd,.sp,.ip,.sr-item,.bc-nav,.sb,.nv,.ft{font-family:"Inter","Noto Sans SC",sans-serif}
.hd{position:fixed;top:0;left:0;right:0;z-index:100;height:52px;background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:4px}
.hd .t{font-size:13px;font-weight:600;letter-spacing:2px;margin-right:auto;text-transform:uppercase;opacity:.7}
.hd button,.nv button,.empty-state .import-btn{background:none;border:1px solid transparent;border-radius:6px;padding:6px 12px;font-size:12px;font-family:inherit;cursor:pointer;transition:all .2s;white-space:nowrap}
.hd button{color:var(--text-dim);font-weight:500;letter-spacing:.3px}
.hd button:hover{color:var(--text);background:var(--border)}
.sp{position:fixed;top:52px;right:0;z-index:99;background:var(--bg-card);border:1px solid var(--border);border-right:0;border-top:0;border-radius:0 0 0 10px;padding:16px;width:210px;display:none;box-shadow:0 8px 32px rgba(0,0,0,.06)}
.sp.o{display:block}
.sg{margin-bottom:12px}.sg label{display:block;font-size:10px;color:var(--text-dim);margin-bottom:3px;letter-spacing:.3px;text-transform:uppercase}
.sg input[type=range]{width:100%;accent-color:var(--accent);height:3px}.sg .v{font-size:11px;color:var(--text);float:right;font-weight:500}
.ip{position:fixed;top:52px;left:0;right:0;z-index:99;background:var(--bg-card);border-bottom:1px solid var(--border);padding:12px 16px;display:none}
.ip.o{display:block}.ip .r{display:flex;gap:8px;max-width:640px;margin:0 auto;flex-wrap:wrap}
.ip input[type=text]{flex:1;min-width:180px;padding:8px 12px;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text);font-size:13px;outline:none}
.ip select{padding:6px 8px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);font-size:11px;outline:none;cursor:pointer}
.ip .h{color:var(--text-dim);font-size:11px;margin:6px auto 0;max-width:640px;text-align:center}
.sr-results{margin-top:12px;max-width:640px;margin-left:auto;margin-right:auto;max-height:320px;overflow-y:auto}
.sr-loading{text-align:center;padding:20px}
.sr-item{padding:10px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;transition:all .2s}
.sr-item:hover{background:var(--border);border-color:var(--accent)}
.sr-item .sr-t{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-item .sr-u,.sr-item .sr-d{font-size:11px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-item .sr-d{margin-top:3px;opacity:.7}
.sf{padding:72px 24px 60px;max-width:960px;margin:0 auto;min-height:100vh}
.sf-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.sf-header h2{font-size:18px;font-weight:600;letter-spacing:.5px}
.sf-header .sc{font-size:11px;color:var(--text-dim);font-weight:400}
.bk{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.bc{position:relative;padding:16px;border:1px solid var(--border);border-radius:10px;background:var(--bg-card);cursor:pointer;transition:all .35s cubic-bezier(.25,.46,.45,.94);overflow:hidden}
.bc:hover{border-color:var(--accent);box-shadow:0 8px 32px rgba(0,0,0,.06);transform:translateY(-2px)}
.bc .ci{width:100%;height:155px;border-radius:6px;overflow:hidden;margin-bottom:12px;background:var(--border);display:flex;align-items:center;justify-content:center}
.bc .ci img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.bc:hover .ci img{transform:scale(1.05)}
.bc .ci .ci-f{display:none;font-size:28px;color:var(--text-dim)}
.bc .ci.ci-fb img{display:none}.bc .ci.ci-fb .ci-f{display:block}
.bc .bn{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px;line-height:1.3}
.bc:hover .bn{color:var(--accent)}
.bc .ba{font-size:11px;color:var(--text-dim)}
.bc .ba em{font-style:normal;color:var(--accent);font-weight:500}
.bc .meta{display:flex;gap:6px;margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.bc .meta span{font-size:10px;color:var(--text-dim)}
.bc .meta .tag{background:var(--border);padding:1px 6px;border-radius:3px;font-size:9px}
.bc .bt{font-size:11px;color:var(--accent2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:.7}
.bc .del{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:6px;border:none;background:rgba(0,0,0,.03);color:var(--text-dim);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .2s}
.bc:hover .del{opacity:1}.bc .del:hover{background:rgba(220,50,50,.08);color:#e55}
.bc .prog-wrap{height:2px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.bc .prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s;width:0%}
.bc .prog-label{font-size:9px;color:var(--text-dim);margin-top:2px;text-align:right;opacity:.6}
.empty-state{text-align:center;padding:100px 20px;max-width:400px;margin:0 auto}
.empty-state .ic{font-size:40px;display:block;font-weight:200;color:var(--text-dim);opacity:.5}
.empty-state h2{font-size:20px;font-weight:600;letter-spacing:.5px}
.empty-state p{font-size:13px;color:var(--text-dim);line-height:1.8}
.empty-state .import-btn{margin-top:20px;padding:10px 28px;border-color:var(--border);background:var(--bg-card);color:var(--text);font-weight:500}
.empty-state .import-btn:hover{border-color:var(--accent);background:var(--accent);color:var(--bg)}
.history-section{margin-top:28px;padding-top:20px;border-top:1px solid var(--border)}
.history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.history-header h3{font-size:15px;font-weight:600;letter-spacing:.5px}
.history-header .sc{font-size:10px;color:var(--text-dim);font-weight:400}
.clear-btn{background:none;border:1px solid var(--border);color:var(--text-dim);padding:3px 10px;border-radius:5px;cursor:pointer;font-size:10px}
.clear-btn:hover{border-color:var(--text);color:var(--text)}
.history-list{display:flex;flex-direction:column;gap:5px}
.history-item{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg-card);cursor:pointer;transition:all .2s}
.history-item:hover{background:var(--border);border-color:var(--accent)}
.history-item.deleted{opacity:.4;cursor:default}
.hi-book{font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:1}
.hi-chapter{font-size:11px;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:1;opacity:.7}
.hi-time{font-size:10px;color:var(--text-dim);white-space:nowrap;margin-left:auto}
.bc-nav{display:none;position:fixed;top:52px;left:0;right:0;z-index:89;padding:4px 16px;background:var(--bg-card);border-bottom:1px solid var(--border);font-size:11px;color:var(--text-dim);align-items:center;gap:2px}
.bc-nav span{cursor:pointer;padding:2px 4px;border-radius:3px}
.bc-nav span:hover{color:var(--accent);background:var(--border)}
.bc-nav .sep{color:var(--border);margin:0 2px;cursor:default;opacity:.5}
.bc-nav .cur{color:var(--accent);font-weight:600;cursor:default;font-size:12px}
.sb{position:fixed;top:52px;left:0;bottom:0;z-index:90;width:var(--sb-w);background:var(--bg-card);border-right:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(-100%);visibility:hidden;transition:transform .35s cubic-bezier(.25,.46,.45,.94),visibility .35s}
.sb.o{transform:translateX(0);visibility:visible}
.sb .sh{padding:12px 16px 8px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center}
.sb .sh .sc{font-size:10px;color:var(--text-dim);font-weight:400}
.sb-cl{position:absolute;right:-10px;top:50%;z-index:91;width:20px;height:20px;border-radius:50%;border:1px solid var(--border);background:var(--bg-card);color:var(--text-dim);cursor:pointer;font-size:8px;display:flex;align-items:center;justify-content:center;transform:translateY(-50%);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.sb-cl:hover{border-color:var(--accent);color:var(--text);transform:translateY(-50%) scale(1.1)}
.sb .srch{padding:8px 12px;border-bottom:1px solid var(--border)}
.sb .srch input{width:100%;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:12px;outline:none}
.sb .sl{list-style:none;padding:4px 0;flex:1;overflow-y:auto;counter-reset:ch}
.sb .sl li{counter-increment:ch;padding:8px 16px 8px 36px;cursor:pointer;font-size:12px;color:var(--text-dim);border-left:2px solid transparent;position:relative;transition:all .15s}
.sb .sl li::before{content:counter(ch);position:absolute;left:10px;top:8px;font-size:10px;opacity:.3;font-family:monospace}
.sb .sl li:hover{color:var(--text);background:var(--border)}
.sb .sl li.cur{color:var(--text);border-left-color:var(--accent);background:var(--border);font-weight:600}
.sb .sl li.cur::before{opacity:.8;color:var(--accent);font-weight:700}
.sb .sl li.cur::after{content:'';position:absolute;right:12px;top:50%;width:4px;height:4px;border-radius:50%;background:var(--accent);transform:translateY(-50%)}
.toc-tab{position:fixed;top:50%;left:0;z-index:89;transform:translateY(-50%);background:var(--bg-card);color:var(--text-dim);border:1px solid var(--border);border-left:0;border-radius:0 6px 6px 0;padding:10px 5px;cursor:pointer;font-size:11px;writing-mode:vertical-lr;letter-spacing:2px;display:none}
.toc-tab:hover{color:var(--text);background:var(--border)}
.rw{display:none;padding-top:72px;padding-bottom:70px;min-height:100vh;transition:margin-left .35s cubic-bezier(.25,.46,.45,.94)}
.rw.sh{margin-left:var(--sb-w)}
.rw .rc{padding:24px 28px;max-width:var(--max-width,860px);margin:0 auto}
.rw .rc p{font-size:var(--font-size);line-height:var(--line-height);text-indent:2em;margin-bottom:.6em}
.rw .rc p.e{text-indent:0;height:1.2em}
.rw .rc h2{font-size:calc(var(--font-size)+6px);font-weight:600;text-align:center;margin:2em 0 1.5em;letter-spacing:2px}
.rw .rc h3{font-size:calc(var(--font-size)+2px);font-weight:600;text-align:center;margin:1.8em 0 1.2em;color:var(--text-dim)}
.nv{display:flex;justify-content:space-between;padding:10px 28px;gap:8px;max-width:var(--max-width,860px);margin:0 auto}
.nv button{flex:1;min-width:80px;padding:9px 12px;border-color:var(--border);background:var(--bg-card);color:var(--text);font-weight:500;letter-spacing:.3px}
.nv button:hover{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.nv button:disabled{opacity:.2;cursor:default}
.ft{position:fixed;bottom:0;left:0;right:0;height:36px;background:var(--bg-card);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:10px;color:var(--text-dim)}
.ft .pg{display:flex;align-items:center;gap:8px;flex:1;max-width:220px}
.ft .br{flex:1;height:2px;background:var(--border);border-radius:4px;overflow:hidden}
.ft .fl{height:100%;background:var(--text);border-radius:4px;width:0%;transition:width .4s}
.lod{display:none;text-align:center;padding:50px}
.lod.s{display:block}
.spn{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:s .7s linear infinite;margin:0 auto 8px}
@keyframes s{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.ko{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center}
.ko.o{display:flex}
.ko-box{background:var(--bg-card);border-radius:10px;padding:24px 28px;max-width:360px;width:90%;box-shadow:0 24px 64px rgba(0,0,0,.2);border:1px solid var(--border)}
.ko-box h3{font-size:15px;font-weight:600;letter-spacing:1px;margin-bottom:14px}
.ko-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid var(--border)}
.ko-row:last-child{border:none}
.ko-row kbd{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:1px 7px;font-size:10px;font-family:monospace}
.ko-row span{color:var(--text-dim)}
.as-btn{position:fixed;right:16px;bottom:48px;z-index:50;width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-dim);cursor:pointer;font-size:11px;display:none;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.as-btn:hover{color:var(--text);border-color:var(--accent);transform:translateY(-1px)}
.as-btn.on{background:var(--accent);color:var(--bg);border-color:var(--accent)}
@media(max-width:700px){:root{--sb-w:220px;--font-size:16px}.rw .rc{padding:14px 16px;max-width:100%}.nv{padding:8px 16px}.sf{padding:68px 12px 40px}.bk{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}.bc{padding:12px}.bc .ci{height:130px}.ko-box{padding:18px 20px}}
</style></head>
<body>

<header class="hd">
  <button id="bb" onclick="h()" style="display:none;color:var(--accent);padding:4px 6px;font-size:16px;line-height:1">←</button>
  <span class="t" onclick="h()" style="cursor:pointer">小e阅读</span>
  <button onclick="ti()">导入</button>
  <button onclick="tSr()">搜索</button>
  <button onclick="ts()">设置</button>
  <button onclick="tt()">主题</button>
</header>

<div class="ip" id="iP">
  <div class="r">
    <input type="text" id="uI" placeholder="粘贴小说链接（目录页）…" onkeydown="if(event.key==='Enter')lu()">
    <button onclick="lu()" style="padding:8px 16px;border:1px solid var(--accent);border-radius:6px;background:var(--accent);color:var(--bg);cursor:pointer;font-size:12px;font-weight:500">加载</button>
    <button onclick="q('fI').click()" style="padding:8px 14px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);cursor:pointer;font-size:12px">本地文件</button>
    <input type="file" id="fI" accept=".txt,.md" style="display:none" onchange="lf(this)">
  </div>
  <div class="h">贴目录页链接，自动提取章节列表</div>
</div>

<div class="ip" id="srP">
  <div class="r">
    <input type="text" id="srI" placeholder="搜索小说名称…" onkeydown="if(event.key==='Enter')doSearch()">
    <select id="srSrc"><option value="bing">必应</option><option value="sogou">搜狗</option></select>
    <button onclick="doSearch()" style="padding:8px 16px;border:1px solid var(--accent);border-radius:6px;background:var(--accent);color:var(--bg);cursor:pointer;font-size:12px;font-weight:500">搜索</button>
  </div>
  <div id="srR" class="sr-results"></div>
  <div class="h">输入名称搜索小说，点击结果直接导入</div>
</div>

<div class="sp" id="sP"><div class="sg"><label>字号 <span class="v" id="fzV">18</span></label><input type="range" min="14" max="32" value="18" id="fzR" oninput="sFz(this.value)"></div><div class="sg"><label>行距 <span class="v" id="lhV">1.9</span></label><input type="range" min="1.4" max="2.8" step="0.1" value="1.9" id="lhR" oninput="sLh(this.value)"></div><div class="sg"><label>宽度 <span class="v" id="mV">860</span></label><input type="range" min="620" max="1020" step="10" value="860" id="wR" oninput="sW(this.value)"></div><div class="sg"><label>字体</label><select id="fF" onchange="sFf(this.value)"><option value="serif">默认衬线</option><option value="source-serif">Source Serif</option><option value="kai">楷体</option><option value="song">宋体</option><option value="hei">黑体</option><option value="yuan">圆体</option></select></div></div>

<div class="sf" id="sF"></div>
<div class="bc-nav" id="bN"><span class="hm" onclick="h()">书架</span><span class="sep">›</span><span id="bT2" onclick="bL()"></span><span class="sep">›</span><span class="cur" id="bC"></span></div>

<div class="sb" id="sB">
  <button class="sb-cl" id="sbClose" onclick="bL()">◀</button>
  <div class="sh"><span id="bT"></span><span><span class="sc" id="chC"></span><span class="sc" id="prC" style="margin-left:6px"></span></span></div>
  <div class="srch"><input type="text" id="chS" placeholder="搜索章节…" oninput="fCh(this.value)"></div>
  <ul class="sl" id="sL"></ul>
</div>

<div class="rw" id="rW">
  <div class="lod" id="lod"><div class="spn"></div><p style="color:var(--text-dim);font-size:13px">加载中…</p></div>
  <div class="rc" id="rC" style="display:none"></div>
  <div class="nv" id="nV" style="display:none">
    <button id="pB" onclick="gCh(-1)">← 上一章</button>
    <button id="bB2" onclick="bL()">目录</button>
    <button id="nB" onclick="gCh(1)">下一章 →</button>
  </div>
</div>

<button class="toc-tab" id="tocTab" onclick="bL()">目</button>
<div id="tst" style="position:fixed;top:64px;left:50%;transform:translateX(-50%) translateY(-8px);z-index:999;background:var(--accent);color:#fff;padding:8px 20px;border-radius:10px;font-size:13px;display:none;box-shadow:0 4px 16px rgba(0,0,0,.15)"></div>
<div class="ft" id="fB" style="display:none">
  <div class="pg"><span id="pT">0%</span><div class="br"><div class="fl" id="pF"></div></div></div>
  <span id="cC"></span>
</div>
<button class="as-btn" id="asB" onclick="tAS()" title="自动滚动">⏬</button>

<div class="ko" id="ko" onclick="if(event.target===this)this.classList.remove('o')">
  <div class="ko-box">
    <h3>快捷键</h3>
    <div class="ko-row"><kbd>←</kbd><span>上一章</span></div>
    <div class="ko-row"><kbd>→</kbd><span>下一章</span></div>
    <div class="ko-row"><kbd>Space</kbd><span>向下翻页</span></div>
    <div class="ko-row"><kbd>B</kbd><span>切换目录</span></div>
    <div class="ko-row"><kbd>I</kbd><span>导入面板</span></div>
    <div class="ko-row"><kbd>S</kbd><span>搜索面板</span></div>
    <div class="ko-row"><kbd>A</kbd><span>自动滚动</span></div>
    <div class="ko-row"><kbd>Esc</kbd><span>关闭面板</span></div>
    <div class="ko-row"><kbd>?</kbd><span>显示帮助</span></div>
  </div>
</div>

<script>
var T=null, BK=[], BK_ID=null, CH=[], CI=-1, bUrl='';
function q(i){return document.getElementById(i)}
function showMsg(m,ok){var t=q('tst');t.textContent=m;t.style.display='block';t.style.background=ok?'var(--accent)':'#e55';clearTimeout(t._t);t._t=setTimeout(function(){t.style.display='none'},2000)}
function ti(){apanel(q('iP'),!q('iP').classList.contains('o'));q('srP').classList.remove('o')}
function ts(){apanel(q('sP'),!q('sP').classList.contains('o'))}
